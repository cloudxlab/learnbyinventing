      - "For O(n·log n): from 64000 to 1,000,000 is a factor of ~15.6. Time grows by roughly 15.6 x (log(10⁶)/log(64000)) ~ 15.6 x 1.25 ~ 19.5. So if merge sort took 0.05s at 64000, the prediction is about 1 second."
