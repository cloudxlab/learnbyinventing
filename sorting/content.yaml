  - type: exercise
    kind: mcq
    id: mcq-5-1
    part: 5
    number: 3
    title: "When O(n) Sorting Is Possible"
    question: |
      Counting sort can sort a billion ages in O(n) time. Why can't we always use it instead of O(n·log n) algorithms like merge sort?
    options:
      - label: A
        text: "Counting sort only works on Python lists, not NumPy arrays"
      - label: B
        text: "Counting sort requires knowing the range of values and works best when that range is small — sorting a billion arbitrary floating-point numbers would need impossibly many buckets"
        correct: true
      - label: C
        text: "Counting sort is unstable, so we can't use it for important data"
      - label: D
        text: "Counting sort uses too much memory for any list larger than 1,000 elements"
    hints:
      - "Counting sort creates one bucket per possible value. How many buckets would you need for decimal numbers like 3.14159?"
    solution:
      code: null
      text: "Counting sort allocates an array of size (max_value - min_value + 1). For ages (0-150), that's 151 buckets — trivial. But for arbitrary floating-point numbers, the range and precision make this impractical (potentially billions of buckets). And for strings or complex objects, there's no natural integer range at all. Comparison-based sorts (merge sort, quicksort) work on anything that can be compared, which is why O(n·log n) is the general-purpose bound."

