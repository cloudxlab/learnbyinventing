    part: 5
    number: 6
    title: "What the Derivative Tells You"
    question: |
      You computed `approx_derivative(f, 3)` and got a value of `-2`. What does this tell you about the function `f` at `x = 3`?
    options:
      - label: A
        text: "f(3) = -2"
      - label: B
        text: "The function is decreasing at x = 3 and its tangent line slopes downward"
