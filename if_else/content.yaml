chapter:
  id: if_else
  title: "Learning If-Else by Inventing Branching Logic"
  intro: |
    You won't be taught — you will *discover*. Every step builds on the last. Trust the process.

    **Python Quick Reference**

    This chapter uses **if/elif/else** to make decisions and **comparisons** to test conditions.

    ```python
    # Comparison operators: ==  !=  <  >  <=  >=
    x = 7
    x > 5           # True
    x == 7          # True
    x != 3          # True

    # if / elif / else
    if x > 10:
        print("big")
    elif x > 5:
        print("medium")    # this runs
    else:
        print("small")

    # Combining conditions: and, or, not
    if x > 0 and x < 100:
        print("in range")

    # Returning different values from a function
    def classify(n):
        if n > 0:
            return "positive"
        elif n < 0:
            return "negative"
        else:
            return "zero"
    ```

    - `if`, `elif`, `else` must end with a colon; the body is indented.
    - `==` tests equality; `=` assigns a value.
    - `and`/`or`/`not` combine boolean conditions.
  colab_url: "https://colab.research.google.com/github/cloudxlab/learnbyinventing/blob/main/if_else/if_else.ipynb"
  mathjax: false
  footer: |
    You've just learned that `if`/`elif`/`else` isn't only for simple yes/no decisions — it's also how you build up geometric reasoning piece by piece. The trick you used twice here, breaking a 2D (or 3D) question into independent 1D questions along each axis, is one of the most reusable ideas in programming.

