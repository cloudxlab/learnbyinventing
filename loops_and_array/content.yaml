  - type: exercise
    kind: mcq
    id: mcq-6-1
    part: 6
    number: 11
    title: "Softmax Temperature"
    question: |
      In softmax with temperature, what happens as the temperature T approaches 0?
    options:
      - label: A
        text: "All outputs become equal (uniform distribution)"
      - label: B
        text: "The output with the highest input gets nearly all the probability — the distribution becomes \"sharper\""
        correct: true
      - label: C
        text: "All outputs become 0"
      - label: D
        text: "The function becomes undefined"
    hints:
      - "Dividing by a very small T makes the input values very large. What does softmax do with very large differences between inputs?"
    solution:
      text: "As T → 0, dividing inputs by T amplifies their differences enormously. The largest input dominates the exponentials, getting nearly 100% of the probability mass. This makes the choice nearly deterministic — always picking the highest-scored option. Conversely, as T → ∞, all inputs approach 0 after division, making all exponentials ≈ 1 and the distribution uniform. Temperature controls the exploration-exploitation tradeoff."

