    title: "Polynomials"
    intro: |
      A polynomial like $2x^3 + 0x^2 + 3x + 10$ is stored as a list of coefficients in **descending** power order: `[2, 0, 3, 10]`. Index 0 = highest power; last index = constant term ($x^0$).

  - type: exercise
