  # MCQ 6.1
  - type: exercise
    kind: mcq
    id: mcq-6-1
    part: 6
    number: 4
    title: "Local Minima"
    question: |
      Gradient descent found a minimum of your loss function. Can you be certain it found the *global* minimum (the absolute lowest point)?
    options:
      - label: A
        text: "Yes — gradient descent always finds the global minimum"
      - label: B
        text: "Only if the loss function is convex (bowl-shaped) — non-convex functions can trap gradient descent in a local minimum"
        correct: true
      - label: C
        text: "No — gradient descent never finds the true minimum, only an approximation"
      - label: D
        text: "Yes, as long as you run enough iterations"
    hints:
      - "Think about a function with multiple valleys. If you start in a small valley, can gradient descent see a deeper valley far away?"
    solution:
      text: |
        Gradient descent follows the local slope downhill. If the loss function has multiple valleys (non-convex), the algorithm can get trapped in a shallow local minimum with no way to 'see' a deeper minimum elsewhere. For convex functions (single bowl shape), like MSE for linear regression, any minimum is the global minimum — gradient descent is guaranteed to find it. This is why convexity of the loss function matters in ML.

