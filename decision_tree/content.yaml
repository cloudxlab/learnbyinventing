      ├── YES → NO (reject)
      └── NO (salary > 1000):
          Is distance <= 40?
          ├── YES (close enough):
          │   Is coffee == 1?         ← 1 means "office has free coffee"
          │   ├── YES → YES (accept)
          │   └── NO  → NO (reject)
          └── NO (too far) → NO (reject)
      ```

      **Tasks:**

