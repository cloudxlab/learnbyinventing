chapter:
  id: getting_started
  title: "Getting Started"
  intro: |
    Before you can invent anything, you need a place to write and run code.
    This chapter gets you set up and running your very first Python program — in
    under 15 minutes.
  mathjax: false
  footer: |
    You're set up and you've written real Python code. Every chapter from here on
    assumes you can open a notebook and run a cell. Let's go invent something.
  glossary:
    - term: Python
      definition: "The programming language used throughout this book. It reads almost like English and is the most popular language for machine learning."
    - term: Jupyter Notebook
      definition: "A document made of *cells* — you write code in a cell, run it, and see the result right below. Files end in `.ipynb`."
    - term: Cell
      definition: "A box in a notebook where you type code or text. Run a code cell with **Shift+Enter** to see its output."
    - term: Google Colab
      definition: "A free, browser-based notebook environment from Google. No installation needed — just a Google account."
    - term: VS Code
      definition: "Visual Studio Code — a free code editor from Microsoft. With the Jupyter extension it can run notebooks locally on your computer."
    - term: Terminal
      definition: "A text-based interface where you type commands. In VS Code, open it with **Ctrl+`** (backtick) or **Terminal → New Terminal**."

blocks:
  # ═══════════════════════════════════════════════════
  # PART 1: Choose Your Setup
  # ═══════════════════════════════════════════════════

  - type: part
    number: 1
    title: "Choose Your Setup"
    estimated_time: "~5 min"
    intro: |
      There are two ways to run the code in this book. Both work for every chapter.
      Pick whichever suits you — you can always switch later.

  - type: text
    text: |
      | | **Path A: Google Colab** | **Path B: VS Code** |
      |---|---|---|
      | **Install anything?** | No — runs in your browser | Yes — Python + VS Code |
      | **Internet needed?** | Yes, always | Only for setup |
      | **Best for** | Quick start, Chromebooks, shared machines | Offline work, larger projects, professional setup |
      | **Speed** | Depends on Google's servers | As fast as your computer |

  - type: text
    text: |
      - **Path A (Google Colab):** If you want to start coding in 2 minutes with zero
        installation, go to **Part 2**.
      - **Path B (VS Code):** If you want a full local setup that works offline, go to
        **Part 3**.

      You can do both — many developers use Colab for quick experiments and VS Code for
      serious projects. After completing your chosen path, skip ahead to **Part 4** for
      your first real program.

  # ═══════════════════════════════════════════════════
  # PART 2: Path A — Google Colab
  # ═══════════════════════════════════════════════════

  - type: part
    number: 2
    title: "Path A — Google Colab"
    estimated_time: "~10 min"
    intro: |
      Google Colab gives you a free Python notebook in your browser. No installation,
      no configuration — just a Google account.

  - type: text
    text: |
      **Step 1.** Open [colab.research.google.com](https://colab.research.google.com)

      **Step 2.** Sign in with your Google account (the same one you use for Gmail or YouTube).

      **Step 3.** Click **"New Notebook"** (or **File → New notebook**).

      You'll see something like this: a blank page with a grey box that says `[ ]` on
      the left. That grey box is a **code cell** — it's where you write Python.

      The `[ ]` turns into a number (like `[1]`) after you run the cell, showing the
      order in which cells were executed.

  - type: exercise
    kind: coding
    id: ex-2-1
    part: 2
    number: 1
    title: "Your First Cell"
    description: |
      Click inside the code cell and type exactly this:

      ```python
      print("Hello, World!")
      ```

      Now run it: press **Shift+Enter** (or click the **play button** ▶ on the left of
      the cell).

      What appears below the cell?
    hints:
      - "You should see `Hello, World!` printed below the cell. If you see an error, check that you typed the line exactly — including the quotes and parentheses."
      - "The `print()` function tells Python to display whatever is inside the parentheses. The quotes tell Python it's text (a *string*), not a command."
    solution:
      code: |
        print("Hello, World!")
        # Output: Hello, World!
      text: |
        The text `Hello, World!` appears below the cell. You just ran your first line of
        Python code.

  - type: exercise
    kind: coding
    id: ex-2-2
    part: 2
    number: 2
    title: "A Quick Calculation"
    description: |
      Click **"+ Code"** at the top to add a new cell. In the new cell, try each of
      these one at a time (you can put them all in one cell too):

      ```python
      2 + 3
      10 * 5
      7 / 2
      2 ** 10
      ```

      What does `**` do? What does `/` give you — is it a whole number or a decimal?
    hints:
      - "`**` is Python's **exponentiation** operator. `2 ** 10` means $2^{10}$ = 1024."
      - "`/` always gives a decimal (float) in Python, even when the result is whole. `10 / 2` gives `5.0`, not `5`. If you want integer division, use `//`."
    solution:
      code: |
        print(2 + 3)     # 5
        print(10 * 5)    # 50
        print(7 / 2)     # 3.5
        print(2 ** 10)   # 1024
      text: |
        Python works as a calculator. The operators are: `+` (add), `-` (subtract),
        `*` (multiply), `/` (divide), `**` (power).

  - type: exercise
    kind: coding
    id: ex-2-3
    part: 2
    number: 3
    title: "Your First Variable"
    description: |
      A **variable** stores a value so you can use it later. In a new cell, type:

      ```python
      name = "your name here"
      print("Hello, " + name + "!")
      ```

      Replace `"your name here"` with your actual name. Run it.

      Now change the name to someone else's and run again. The code is the same — only
      the data changed.
    hints:
      - "Make sure your name is inside quotes — `name = \"Alice\"`, not `name = Alice`. Without quotes, Python thinks `Alice` is a variable name and will throw an error."
    solution:
      code: |
        name = "Alice"
        print("Hello, " + name + "!")
        # Output: Hello, Alice!
      text: |
        Variables let you store and reuse values. The `=` sign means "store this value
        in this name" — it's not a math equation.

  - type: reveal
    text: |
      **You're set up with Google Colab!**

      Every chapter in this book can be opened directly in Colab — look for the
      **"Open in Colab"** button at the top of each chapter page.

      Now skip to **Part 4** to write your first real program.

  # ═══════════════════════════════════════════════════
  # PART 3: Path B — VS Code + Python
  # ═══════════════════════════════════════════════════

  - type: part
    number: 3
    title: "Path B — VS Code + Python"
    estimated_time: "~20 min"
    intro: |
      This path sets up a full Python environment on your computer. It takes a few more
      minutes, but you'll have a professional-grade setup that works offline.

  - type: text
    text: |
      ### Step 1: Install Python

      1. Go to [python.org/downloads](https://www.python.org/downloads/)
      2. Click the big **"Download Python 3.x.x"** button
      3. Run the installer

      **Important (Windows):** Check the box that says **"Add Python to PATH"** before
      clicking Install. If you miss this, Python won't be found from the terminal.

      **Mac:** Python 3 may already be installed. Open Terminal and type `python3 --version`
      to check. If not, the python.org installer works, or use `brew install python3`
      if you have Homebrew.

      ### Step 2: Install VS Code

      1. Go to [code.visualstudio.com](https://code.visualstudio.com/)
      2. Download and install for your operating system

      ### Step 3: Install Extensions

      1. Open VS Code
      2. Click the **Extensions** icon in the left sidebar (or press **Ctrl+Shift+X** / **Cmd+Shift+X**)
      3. Search for and install:
         - **Python** (by Microsoft) — Python language support
         - **Jupyter** (by Microsoft) — notebook support inside VS Code

  - type: exercise
    kind: coding
    id: ex-3-1
    part: 3
    number: 1
    title: "Verify Your Setup"
    description: |
      Open a terminal in VS Code:

      - **Windows/Linux:** Press **Ctrl+`** (backtick) or go to **Terminal → New Terminal**
      - **Mac:** Press **Cmd+`** or go to **Terminal → New Terminal**

      Type this and press Enter:

      ```
      python --version
      ```

      You should see something like `Python 3.12.4` (the exact version doesn't matter as
      long as it starts with 3).

      **Mac users:** If `python` doesn't work, try `python3 --version` instead.
    hints:
      - "If you get `command not found` or `'python' is not recognized`, Python isn't on your PATH. On Windows, re-run the Python installer and check **'Add Python to PATH'**. On Mac/Linux, try `python3` instead of `python`."
    solution:
      code: null
      text: |
        You should see output like `Python 3.12.4`. Any version 3.8 or higher works
        for this book.

  - type: exercise
    kind: coding
    id: ex-3-2
    part: 3
    number: 2
    title: "Try the Python Interpreter"
    description: |
      Before we open a notebook, let's use Python directly in the terminal. This is the
      **Python interpreter** — a place where you type one line at a time and Python
      responds immediately.

      In the same VS Code terminal, type:

      ```
      python
      ```

      (Mac/Linux: use `python3` if `python` doesn't work.)

      You should see something like:

      ```
      Python 3.12.4 (...)
      Type "help", "copyright", "credits" or "license" for more information.
      >>>
      ```

      The `>>>` is Python's prompt — it's waiting for you. Now try these one at a time:

      ```python
      >>> 2 + 3
      >>> 10 * 5
      >>> 2 ** 10
      >>> print("Hello from the interpreter!")
      >>> name = "Alice"
      >>> print("Hello, " + name)
      ```

      Notice that the interpreter shows results immediately — you don't even need
      `print()` for expressions like `2 + 3`.

      When you're done, type `exit()` to leave the interpreter and return to the
      normal terminal.
    hints:
      - "If you see `>>>`, you're in the Python interpreter. Each line you type runs immediately. This is great for quick experiments."
      - "To exit, type `exit()` and press Enter. You'll return to the regular terminal prompt."
    solution:
      code: null
      text: |
        The interpreter is Python's simplest mode — no files, no notebooks, just type
        and see. It's useful for quick tests and exploring how things work. Notebooks
        build on this same idea but let you save your work.

  - type: exercise
    kind: coding
    id: ex-3-3
    part: 3
    number: 3
    title: "Create a Python File and Run It"
    description: |
      The interpreter is great for quick experiments, but real programs live in **files**.
      Let's create one.

      1. In VS Code, go to **File → New File** (or press **Ctrl+N** / **Cmd+N**)
      2. Save it as `hello.py` — pick any folder you like
         (**File → Save As**, or **Ctrl+S** / **Cmd+S**)
      3. Type these lines in the file:

      ```python
      name = "Alice"
      print("Hello, " + name + "!")
      print(name, "can count to", 2 ** 10)
      ```

      4. Save the file again (**Ctrl+S** / **Cmd+S**)
      5. Open the terminal (**Ctrl+`** or **Terminal → New Terminal**)
      6. Navigate to the folder where you saved the file (use `cd` if needed) and run:

      ```
      python hello.py
      ```

      (Mac/Linux: use `python3 hello.py` if needed.)

      You should see the output printed in the terminal. Change the name in the file,
      save, and run again — notice you have to **save** before running, unlike the
      interpreter.
    hints:
      - "If you get `No such file or directory`, make sure your terminal is in the same folder as `hello.py`. Use `ls` (Mac/Linux) or `dir` (Windows) to list files and `cd foldername` to navigate."
      - "The `.py` extension tells VS Code (and you) that this is a Python file. VS Code will automatically highlight the syntax for you."
    solution:
      code: |
        # hello.py
        name = "Alice"
        print("Hello, " + name + "!")
        print(name, "can count to", 2 ** 10)

        # In terminal:
        # $ python hello.py
        # Hello, Alice!
        # Alice can count to 1024
      text: |
        You've now used Python in three ways: the **interpreter** (one line at a time),
        a **script file** (saved and run from the terminal), and next you'll try
        **notebooks** (the best of both — save your work and see results inline).

  - type: exercise
    kind: coding
    id: ex-3-4
    part: 3
    number: 4
    title: "Create a Notebook"
    description: |
      1. In VS Code, press **Ctrl+Shift+P** (or **Cmd+Shift+P** on Mac) to open the
         Command Palette
      2. Type **"Jupyter: Create New Blank Notebook"** and select it
      3. You'll see an empty notebook with a code cell
      4. VS Code may ask you to **select a kernel** — pick the Python version you
         installed (e.g. `Python 3.12.4`)

      Now type this in the first cell:

      ```python
      print("Hello from VS Code!")
      ```

      Press **Shift+Enter** to run it.
    hints:
      - "If you don't see the Jupyter option in the Command Palette, make sure you installed the **Jupyter** extension (Step 3 above). You may need to restart VS Code after installing it."
      - "If 'Select Kernel' appears at the top right, click it and choose your Python installation. If no Python appears, your Python installation may not be on the PATH."
    solution:
      code: |
        print("Hello from VS Code!")
        # Output: Hello from VS Code!
      text: |
        You should see `Hello from VS Code!` printed below the cell. You now have a
        working Jupyter notebook inside VS Code.

  - type: exercise
    kind: coding
    id: ex-3-5
    part: 3
    number: 5
    title: "A Quick Calculation"
    description: |
      Click **"+ Code"** (or press **B** when no cell is selected) to add a new cell.
      Try these:

      ```python
      2 + 3
      10 * 5
      7 / 2
      2 ** 10
      ```

      What does `**` do? What does `/` give you?
    hints:
      - "`**` is Python's **exponentiation** operator. `2 ** 10` means $2^{10}$ = 1024."
      - "`/` always gives a decimal (float). Use `//` for integer division."
    solution:
      code: |
        print(2 + 3)     # 5
        print(10 * 5)    # 50
        print(7 / 2)     # 3.5
        print(2 ** 10)   # 1024
      text: null

  - type: exercise
    kind: coding
    id: ex-3-6
    part: 3
    number: 6
    title: "Your First Variable"
    description: |
      In a new cell:

      ```python
      name = "your name here"
      print("Hello, " + name + "!")
      ```

      Replace `"your name here"` with your actual name. Run it, then change the name
      and run again.
    hints:
      - "Make sure your name is inside quotes. Without quotes, Python treats it as a variable name and throws a `NameError`."
    solution:
      code: |
        name = "Alice"
        print("Hello, " + name + "!")
        # Output: Hello, Alice!
      text: null

  - type: reveal
    text: |
      **You're set up with VS Code!**

      You can open any `.ipynb` file from this book in VS Code — just download the
      notebook and open it with **File → Open File**. VS Code will render it just like
      Colab does.

      Now continue to **Part 4** for your first real program.

  # ═══════════════════════════════════════════════════
  # PART 4: Your First Program
  # ═══════════════════════════════════════════════════

  - type: part
    number: 4
    title: "Your First Program"
    estimated_time: "~10 min"
    intro: |
      Whichever path you chose, you now have a working notebook. Let's write a few small
      programs to make sure everything clicks — and learn a couple of important lessons
      along the way.

  - type: exercise
    kind: coding
    id: ex-4-1
    part: 4
    number: 1
    title: "Predict Before You Run"
    description: |
      **Before running each line**, write down what you think it will print. Then run it
      and check.

      ```python
      print(3 + 4)
      print("3 + 4")
      print("Result:", 3 + 4)
      ```

      Why do the first two give different outputs?
    hints:
      - "The first line computes `3 + 4` and prints the number `7`. The second prints the *text* `3 + 4` — the quotes tell Python it's a string, not a calculation."
      - "`print()` can take multiple things separated by commas. It prints them with spaces in between: `print(\"Result:\", 7)` gives `Result: 7`."
    solution:
      code: |
        print(3 + 4)          # 7         — Python computes the sum
        print("3 + 4")        # 3 + 4     — Python prints the text as-is
        print("Result:", 3 + 4)  # Result: 7 — mixed text and computation
      text: |
        Quotes make all the difference. Without quotes, `3 + 4` is an expression that
        Python evaluates. With quotes, `"3 + 4"` is just text — Python doesn't touch it.

  - type: exercise
    kind: coding
    id: ex-4-2
    part: 4
    number: 2
    title: "Your First Bug"
    description: |
      Type this **exactly** — with the deliberate mistake:

      ```python
      print("Hello World)
      ```

      Run it. You'll get an error. Read the error message carefully:

      1. What kind of error is it?
      2. Can you figure out what's wrong just from the message?
      3. Fix it and run again.

      Errors are not failures — they're Python telling you exactly what went wrong.
      Learning to **read error messages** is one of the most important programming skills.
    hints:
      - "You should see a `SyntaxError` with a message about an unterminated string. The closing `\"` is missing."
      - "Fix: `print(\"Hello World\")` — add the missing quote before the closing parenthesis."
    solution:
      code: |
        # The bug: missing closing quote
        # print("Hello World)   # SyntaxError: unterminated string literal

        # The fix:
        print("Hello World")
      text: |
        Python says `SyntaxError: unterminated string literal`. It even points to where
        the problem is. Every error message has useful information — always read it
        before asking for help.

  - type: exercise
    kind: coding
    id: ex-4-3
    part: 4
    number: 3
    title: "Make It Yours"
    description: |
      Write a program that:

      1. Stores your name in a variable called `name`
      2. Stores your favourite number in a variable called `fav`
      3. Prints a greeting with your name
      4. Prints what your favourite number squared is

      Here's a skeleton to get you started:

      ```python
      name = "..."
      fav = ...

      print(name, "likes the number", fav)
      print(fav, "squared is", fav ** 2)
      ```

      Replace `"..."` and `...` with your actual name and number.
    hints:
      - "Remember: text goes in quotes (`name = \"Alice\"`), numbers don't (`fav = 7`)."
      - "The `**` operator raises a number to a power. `fav ** 2` squares it."
    solution:
      code: |
        name = "Alice"
        fav = 7

        print(name, "likes the number", fav)
        print(fav, "squared is", fav ** 2)

        # Output:
        # Alice likes the number 7
        # 7 squared is 49
      text: |
        You used variables, arithmetic, and `print()` — the three building blocks
        you'll use in every chapter of this book.

  - type: reveal
    text: |
      **Congratulations — you're ready to start inventing!**

      You now know how to:
      - Open a notebook (in Colab or VS Code)
      - Write and run code in cells
      - Use `print()` to see output
      - Store values in variables
      - Use Python as a calculator (`+`, `-`, `*`, `/`, `**`)
      - Read error messages and fix bugs

      These are the only tools you need. Every algorithm in this book will be built
      from just these basics — one small step at a time.

  # ═══════════════════════════════════════════════════
  # SUMMARY
  # ═══════════════════════════════════════════════════

  - type: part
    number: null
    title: "What You Learned"
    intro: null

  - type: table
    id: summary-table
    title: "Quick Reference"
    headers: ["What", "How"]
    rows:
      - ["Run a cell", "**Shift+Enter**"]
      - ["Add a new cell", "**+ Code** button (Colab) or **B** key (VS Code)"]
      - ["Print something", "`print(\"Hello\")`"]
      - ["Store a value", "`x = 42`"]
      - ["Add / subtract", "`+` / `-`"]
      - ["Multiply / divide", "`*` / `/`"]
      - ["Power (exponent)", "`**` — e.g. `2 ** 10` = 1024"]
      - ["Text (string)", "Wrap in quotes: `\"Hello\"`"]
      - ["Read an error", "Look at the **last line** — it tells you what went wrong"]
