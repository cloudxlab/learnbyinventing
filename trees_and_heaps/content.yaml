  - type: exercise
    kind: mcq
    id: mcq-3-1
    part: 3
    number: 6
    title: "Heap Property"
    question: "In a min-heap, which of the following is guaranteed?"
    options:
      - label: A
        text: "The left child is always smaller than the right child"
      - label: B
        text: "Every parent is smaller than or equal to both its children, and the root is the overall minimum"
        correct: true
      - label: C
        text: "The tree is sorted from left to right at every level"
      - label: D
        text: "The smallest element is always at the bottom-left"
    hints:
      - "The heap property is about parent-child relationships, not about siblings."
    solution:
      text: "The min-heap property guarantees only that each parent <= its children. This means the root is the minimum (it's smaller than its children, which are smaller than theirs, etc.). But siblings have NO ordering guarantee -- the left child can be larger than the right child or vice versa. The heap is NOT fully sorted; it only guarantees the minimum is accessible in O(1) and can be removed in O(log n)."

  - type: exercise
    kind: mcq
    id: mcq-3-2
    part: 3
    number: 7
    title: "Heap vs BST"
    question: "Both a BST and a min-heap store elements. When would you choose a heap over a BST?"
    options:
      - label: A
        text: "When you need to search for arbitrary elements quickly"
      - label: B
        text: "When you repeatedly need the minimum (or maximum) element and don't need to search for arbitrary values"
        correct: true
      - label: C
        text: "When you need to iterate elements in sorted order"
      - label: D
        text: "When the data contains duplicates"
    hints:
      - "What operation is O(1) in a heap but O(log n) in a BST? And what operation is easy in a BST but hard in a heap?"
    solution:
      text: "A heap excels at one thing: quickly accessing and removing the min (or max). The root gives you the min in O(1), and removal is O(log n). But finding an arbitrary element requires scanning the entire heap -- O(n). A BST gives O(log n) search for any element and O(n) sorted traversal, but the minimum requires walking to the leftmost node -- O(log n). Choose a heap for priority queues (always need the \"next most urgent\"); choose a BST when you need general search or sorted iteration."

