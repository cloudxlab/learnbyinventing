header:
  by: Sandeep Giri
  by_url: https://girisandeep.com
  title: Learn By Inventing
  tagline: "Machine Learning &amp; Computer Science &mdash; derived, not memorized."
  philosophy: |
    Instead of starting with a formula or an explanation, every chapter here gives you
    a sequence of small problems. As you work through them, you begin to see the pattern
    yourself. By the end, you have not been taught an algorithm &mdash; you have invented one.
    That is the difference between knowledge you can recite and understanding you can use.
  philosophy_link: https://girisandeep.com/learning-by-inventing/

preface: |
  Do not read this book. <em>Work with it.</em> Keep a coding environment open alongside each chapter.
  Each exercise is one small step &mdash; complete it before moving to the next.
  Resist the urge to look ahead. The struggle is the lesson.

