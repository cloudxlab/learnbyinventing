    description: |
      Now put it together:

      1. Play one episode (collect observations, actions, rewards, gradients)
      2. Compute discounted rewards and normalize them
      3. For each step: multiply the gradient by the normalized discounted reward
      4. Sum all the weighted gradients
      5. Update: `weights += learning_rate * total_gradient`

      This is **gradient ascent** — we want MORE reward, not less (unlike gradient descent where we minimized loss).
