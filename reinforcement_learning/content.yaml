  - type: reveal
    text: |
      You just invented the core of **value-based reinforcement learning**:

      - A model that predicts future reward from a state = the **value function** (or **critic**)
      - Training it step-by-step using $r + \gamma V(s')$ = **Temporal Difference (TD) learning**
      - Using a neural network instead of linear weights = **Deep Q-Network (DQN)**

      The value model doesn't pick actions — it just evaluates states. That's why it's called the **critic**: it watches the policy (the actor) play and judges how well it's doing.

