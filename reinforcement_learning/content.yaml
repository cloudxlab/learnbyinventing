  - type: part
    number: 7
    title: "Teaching a Model to Play — REINFORCE"
    intro: |
      So far you've been hand-tuning weights or using evolution. Now for a powerful idea: what if a model LEARNS the weights by playing the game over and over?

  - type: reveal
    text: |
      Here's the key insight:

      1. The model sees the observation and outputs a **probability** of going right (e.g., 70%)
      2. We sample an action from that probability (go right 70% of the time)
      3. We play the whole game, collecting rewards
      4. For actions that led to **high reward** — we adjust the model to make those actions MORE likely
      5. For actions that led to **low reward** — we adjust the model to make those actions LESS likely

      Even an untrained model says SOMETHING — "go right 50% of the time." We play, and the rewards tell us which of those random choices were accidentally good. Then we nudge the model to repeat the good accidents.

