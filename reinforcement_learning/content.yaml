  - type: exercise
    kind: coding
    id: ex-8-3
    part: 8
    number: 3
    title: "Temporal Difference Learning"
    description: |
      Instead of waiting for the full episode to compute discounted returns, use the value model itself to estimate future reward. At each step:

      $$\text{TD target} = r_t + \gamma \cdot V(s_{t+1})$$

      The actual reward you got PLUS the predicted future value of the next state. Train the value model using this target instead of the full discounted return.

      Update rule: $\mathbf{v} \leftarrow \mathbf{v} + \alpha \cdot (r_t + \gamma \cdot V(s_{t+1}) - V(s_t)) \cdot s_t$

      The term $(r_t + \gamma \cdot V(s_{t+1}) - V(s_t))$ is called the **TD error**.
    provided_code: []
    hints:
      - |
        ```python
        def td_update(obs, reward, next_obs, done, value_weights, gamma=0.99, lr=0.001):
            current_v = predict_value(obs, value_weights)
            next_v = 0 if done else predict_value(next_obs, value_weights)
            td_target = reward + gamma * next_v
            td_error = td_target - current_v
            value_weights += lr * td_error * obs
            return value_weights, td_error
        ```
    solution:
      code: |
        def td_update(obs, reward, next_obs, done, value_weights, gamma=0.99, lr=0.001):
            current_v = predict_value(obs, value_weights)
            next_v = 0.0 if done else predict_value(next_obs, value_weights)
            td_target = reward + gamma * next_v
            td_error = td_target - current_v
            value_weights += lr * td_error * obs
            return value_weights, td_error
