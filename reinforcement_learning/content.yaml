  - type: exercise
    kind: coding
    id: ex-6-4
    part: 6
    number: 4
    title: "Invent Discounted Rewards"
    description: |
      Here's an idea: for each step t, compute its "return" as:

      $$R_t = r_t + \gamma \cdot r_{t+1} + \gamma^2 \cdot r_{t+2} + \gamma^3 \cdot r_{t+3} + \ldots$$

      where $\gamma$ (gamma) = 0.99 is a "discount factor." Rewards far in the future get multiplied by $0.99^{50}$, $0.99^{100}$, etc. — they fade away.

      Write `compute_discounted_rewards(rewards, gamma=0.99)` that takes a list of rewards (one per step) and returns the discounted return for each step.
    provided_code:
      - label: "test"
        code: |
          # Test: if rewards = [1, 1, 1, 1, 1], gamma = 0.99
          # R_0 = 1 + 0.99 + 0.99^2 + 0.99^3 + 0.99^4
          # R_4 = 1 (last step, no future)
          test_rewards = [1, 1, 1, 1, 1]
          result = compute_discounted_rewards(test_rewards, gamma=0.99)
          print("Discounted rewards:", result)
          # R_0 should be ~4.90, R_4 should be 1.0
    hints:
      - "Work backwards! Start from the last step (R_T = r_T). Then R_{T-1} = r_{T-1} + gamma * R_T. Then R_{T-2} = r_{T-2} + gamma * R_{T-1}. And so on."
      - |
        ```python
        def compute_discounted_rewards(rewards, gamma=0.99):
            discounted = [0] * len(rewards)
            running = 0
            for t in reversed(range(len(rewards))):
                running = rewards[t] + gamma * running
                discounted[t] = running
            return discounted
        ```
    solution:
      code: |
        def compute_discounted_rewards(rewards, gamma=0.99):
            discounted = [0.0] * len(rewards)
            running = 0.0
            for t in reversed(range(len(rewards))):
                running = rewards[t] + gamma * running
                discounted[t] = running
            return discounted
      text: null

