      - "With numpy, you'll need the ReLU derivative: `d_relu = (self.z1 > 0).astype(float)`. Chain rule for w2: `d_w2 = self.h.T @ d_output`. For w1: `d_w1 = x.T @ (d_output @ self.w2.T * d_relu)`."
