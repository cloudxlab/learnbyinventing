  - type: reveal
    text: |
      You just invented the **REINFORCE** algorithm (Williams, 1992)! The key insight:

      - Good actions (high discounted reward) → gradient gets amplified → model repeats them more
      - Bad actions (low/negative normalized reward) → gradient gets reversed → model avoids them

      No one told the model the rules of physics. It learned by playing, failing, and adjusting — just like you did in Part 1, but automatically.

