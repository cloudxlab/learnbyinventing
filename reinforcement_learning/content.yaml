      The TD error tells you something powerful: whether the action was **better or worse than expected**.

      $$A_t = r_t + \gamma \cdot V(s_{t+1}) - V(s_t)$$

      - If $A_t > 0$: the action led to a state that's BETTER than expected → good action!
      - If $A_t < 0$: the action led to a state WORSE than expected → bad action.

      This is called the **advantage**. It's much less noisy than using raw rewards because it compares against a baseline (what the value model expected).

