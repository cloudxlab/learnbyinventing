chapter:
  id: binary_search
  title: "Binary Search and Approximations"
  intro: |
    A single idea powers this entire chapter: if you know a function is **monotone** (always increasing or always decreasing), you can find any target value in it by repeatedly halving your search interval. You will apply this idea to approximate square roots, cube roots, nth roots, and logarithms — without ever using `math.sqrt`, `math.log`, or `**`.
  colab_url: "https://colab.research.google.com/github/cloudxlab/learnbyinventing/blob/main/binary_search/binary_search.ipynb"
  mathjax: true
  footer: |
    You approximated square roots, cube roots, nth roots, and logarithms — all without using any built-in math functions. The single idea of halving a search interval is one of the most powerful tools in all of computer science.

