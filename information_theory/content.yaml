    title: "Huffman Optimality"
    question: |
      Huffman coding assigns shorter codes to more frequent symbols. Is this always the most efficient possible prefix-free encoding?
    options:
      - label: A
        text: "No — there are always better encodings that Huffman misses"
      - label: B
        text: "Yes — Huffman is provably optimal among all prefix-free codes that assign a whole number of bits per symbol"
