    kind: mcq
    id: mcq-5-1
    part: 5
    number: 4
    title: "Why Smoothing Works"
    question: "Laplace smoothing adds 1 to every count. What would happen if you added **1000** instead of 1?"
    options:
      - label: A
        text: "The classifier would become more accurate because it has more \"data\""
      - label: B
        text: "Nothing would change — the relative ordering of scores stays the same"
      - label: C
        text: "All smoothed probabilities would approach 1/k (uniform) — the fake counts would overwhelm the real data, and the classifier would ignore the actual evidence"
        correct: true
      - label: D
        text: "Python would crash with an overflow error"
    hints:
      - "With smoothing of 1000: P(Sunny|Yes) = (2 + 1000) / (9 + 3000) ≈ 1002/3009 ≈ 1/3. P(Overcast|Yes) = (4 + 1000) / (9 + 3000) ≈ 1004/3009 ≈ 1/3. They become nearly identical."
    solution:
      text: "Large smoothing values drown out the real data. P(Sunny|Yes) = (2+1000)/(9+3000) ≈ 0.333 and P(Overcast|Yes) = (4+1000)/(9+3000) ≈ 0.334 — nearly identical. The classifier can no longer distinguish features because the fake counts dominate. A smoothing of 1 is the standard choice: just enough to avoid zeros without distorting the real signal."

