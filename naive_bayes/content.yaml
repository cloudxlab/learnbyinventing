        Score(Yes) = (2/9)(2/9)(3/9)(9/14) = 12/1134 ≈ 0.0106.
        Score(No) = (3/5)(2/5)(4/5)(5/14) = 24/350 ≈ 0.069.
        No wins convincingly.
    solution:
      code: null
      text: "Score(Yes) ≈ 0.011, Score(No) ≈ 0.069. Predict **No**. Adding the humidity feature reinforced the prediction — High humidity is strongly associated with No days."

  - type: exercise
